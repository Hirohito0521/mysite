<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Time Color</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/microsoft/cascadia-code@latest/releases/cascadia.css">

<style>

:root{
    --bg:#1a1d21;
    --text:#ffffff;
    --grid-opacity:0.05;
}

body.light{
    --bg:#ececec;
    --text:#121212;
    --grid-opacity:0.07;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:var(--bg);
    color:var(--text);

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;
    font-family:'Cascadia Code', monospace;

    transition:
        background .5s ease,
        color .5s ease;
}

/* ===== 背景グロー ===== */

.bg-glow{
    position:fixed;
    inset:0;
    z-index:-2;
    filter:blur(130px);
    opacity:0.18;
    transition:
        background 1s ease;
}

/* ===== グリッド ===== */

.grid{
    position:fixed;
    inset:0;
    z-index:-1;

    background-image:
    linear-gradient(
        rgba(255,255,255,var(--grid-opacity)) 1px,
        transparent 1px
    ),
    linear-gradient(
        90deg,
        rgba(255,255,255,var(--grid-opacity)) 1px,
        transparent 1px
    );

    background-size:40px 40px;
}

/* ===== テーマボタン ===== */

.theme-btn{
    position:fixed;
    top:20px;
    right:20px;

    width:52px;
    height:52px;

    border:none;
    border-radius:18px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);

    color:var(--text);
    font-size:1.3rem;
    cursor:pointer;

    transition:.25s ease;
}

.theme-btn:active{
    transform:scale(.95);
}

/* ===== メイン ===== */

.wrapper{
    display:flex;
    align-items:center;
    gap:52px;
    padding:20px;
}

/* ===== 時計 ===== */

.time-container{
    display:flex;
    gap:4px;
    font-size:clamp(3rem, 7vw, 6rem);
    font-weight:600;
    letter-spacing:0.06em;
    user-select:none;
}

.char-wrapper{
    position:relative;
    width:.75em;
    height:1.2em;
    overflow:hidden;
}

.char{
    position:absolute;
    width:100%;
    top:0;
    left:0;

    transform:translateY(-100%);
    opacity:0;

    transition:
        transform .35s cubic-bezier(.2,.8,.2,1),
        opacity .35s ease;
}

.char.show{
    transform:translateY(0);
    opacity:1;
}

.char.exit{
    transform:translateY(100%);
    opacity:0;
}

/* ===== カード ===== */

.color-card{
    width:240px;
    padding:28px;
    border-radius:30px;

    backdrop-filter:blur(10px);

    box-shadow:
        0 15px 40px rgba(0,0,0,.15);

    transition:
        background-color .8s ease,
        transform .25s ease,
        color .25s ease;
}

.color-card.animate{
    transform:scale(1.02);
}

.rgb-line{
    font-size:1.45rem;
    font-weight:500;
    opacity:.72;
    margin:8px 0;
}

.hex{
    margin-top:12px;
    font-size:.9rem;
    opacity:.55;
}

</style>
</head>

<body>

<div class="bg-glow" id="glow"></div>
<div class="grid"></div>

<button class="theme-btn" id="themeBtn">
☼
</button>

<div class="wrapper">

    <div class="time-container"
    id="timeContainer"></div>

    <div class="color-card"
    id="colorCard">

        <div class="rgb-line"
        id="rValue">R: 00</div>

        <div class="rgb-line"
        id="gValue">G: 00</div>

        <div class="rgb-line"
        id="bValue">B: 00</div>

        <div class="hex"
        id="hexValue">
        #000000
        </div>

    </div>

</div>

<script>

const body = document.body;
const btn = document.getElementById("themeBtn");

if(localStorage.getItem("theme")==="light"){
    body.classList.add("light");
}

btn.onclick = ()=>{

    body.classList.toggle("light");

    localStorage.setItem(
        "theme",
        body.classList.contains("light")
        ? "light"
        : "dark"
    );
};

/* ===== 時計生成 ===== */

const timeContainer =
document.getElementById("timeContainer");

let currentChars = [];

function setupClock(){

    "00:00:00"
    .split("")
    .forEach(char=>{

        const wrapper =
        document.createElement("div");

        wrapper.className =
        "char-wrapper";

        const span =
        document.createElement("div");

        span.className =
        "char show";

        span.textContent =
        char;

        wrapper.appendChild(span);
        timeContainer.appendChild(wrapper);

        currentChars.push(span);
    });
}

function animateCard(card){

    card.classList.add("animate");

    setTimeout(()=>{
        card.classList.remove("animate");
    },220);
}

function updateClock(){

    const now = new Date();

    const time =
    `${String(now.getHours()).padStart(2,'0')}:` +
    `${String(now.getMinutes()).padStart(2,'0')}:` +
    `${String(now.getSeconds()).padStart(2,'0')}`;

    [...time].forEach((newChar,index)=>{

        const old =
        currentChars[index];

        if(old.textContent!==newChar){

            const wrapper =
            old.parentElement;

            old.classList.add("exit");
            old.classList.remove("show");

            const next =
            document.createElement("div");

            next.className =
            "char";

            next.textContent =
            newChar;

            wrapper.appendChild(next);

            requestAnimationFrame(()=>{
                next.classList.add("show");
            });

            setTimeout(()=>{
                old.remove();
            },350);

            currentChars[index] =
            next;
        }
    });

    const h =
    now.getHours()
    .toString(16)
    .padStart(2,'0')
    .toUpperCase();

    const m =
    now.getMinutes()
    .toString(16)
    .padStart(2,'0')
    .toUpperCase();

    const s =
    now.getSeconds()
    .toString(16)
    .padStart(2,'0')
    .toUpperCase();

    const color =
    `#${h}${m}${s}`;

    const card =
    document.getElementById("colorCard");

    card.style.background =
    color;

    animateCard(card);

    document.getElementById("glow")
    .style.background =
    `radial-gradient(circle, ${color}, transparent 60%)`;

    document.getElementById("rValue")
    .textContent=`R: ${h}`;

    document.getElementById("gValue")
    .textContent=`G: ${m}`;

    document.getElementById("bValue")
    .textContent=`B: ${s}`;

    document.getElementById("hexValue")
    .textContent=color;

    const brightness =
    (
        parseInt(h,16)*299 +
        parseInt(m,16)*587 +
        parseInt(s,16)*114
    ) / 1000;

    card.style.color =
    brightness > 145
    ? "#111"
    : "#fff";
}

setupClock();
updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
